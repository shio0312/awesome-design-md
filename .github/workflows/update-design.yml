name: Auto Update DESIGN.md

# 週次で自動実行 + 手動実行も可能
on:
  schedule:
    # 毎週日曜日の午前2時（UTC）に実行
    - cron: '0 2 * * 0'
  workflow_dispatch:  # 手動実行を許可

jobs:
  update-design-md:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Create .env file
        run: |
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" > .env

      - name: Run update script
        id: update
        run: |
          python update_design_auto.py
        continue-on-error: true

      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain design-md/) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ DESIGN.mdファイルに変更がありました"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ 変更はありませんでした"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            🤖 Auto-update DESIGN.md files

            自動更新スクリプトによるDESIGN.mdファイルの更新

            - サイトのデザイン変更を検知
            - 最新のデザインシステムを反映
          branch: auto-update-design-md
          delete-branch: true
          title: '🤖 Auto-update DESIGN.md files'
          body: |
            ## 🤖 自動更新

            このPRは週次の自動更新プロセスによって作成されました。

            ### 変更内容

            以下のDESIGN.mdファイルが更新されています：

            - サイトのデザイン変更を検知
            - Claude APIで最新のデザインシステムを解析
            - DESIGN.mdを再生成

            ### レビュー事項

            - [ ] 更新内容が正確か確認
            - [ ] カラーコード、フォント情報が正しいか確認
            - [ ] フォーマットに問題がないか確認

            ### マージ方法

            問題がなければマージしてください。
            間違いがある場合は手動で修正するか、このPRをクローズしてください。

            ---
            🔧 Generated by `update-design.yml` workflow
          labels: |
            automated
            design-system
            documentation
